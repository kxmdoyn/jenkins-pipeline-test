apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-pipeline-test
  namespace: class-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-pipeline-test
  template:
    metadata:
      labels:
        app: jenkins-pipeline-test
    spec:
      containers:
        - name: jenkins-pipeline-test
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
